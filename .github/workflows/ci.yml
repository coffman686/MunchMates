name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: munchmates
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: munchmates

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: munchmates/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npx eslint .

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/munchmates
          KEYCLOAK_ISSUER: http://localhost:8080/realms/munchmates
          KEYCLOAK_ADMIN_CLIENT_ID: admin-cli
          KEYCLOAK_ADMIN_CLIENT_SECRET: dummy
          NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8080
          NEXT_PUBLIC_KEYCLOAK_REALM: munchmates
          NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: munchmates-spa
          SPOONACULAR_API_KEY: dummy
          REDIS_URL: ""
        run: npx next build
